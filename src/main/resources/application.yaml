spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: auth-service
            uri: lb://commerce-system
            predicates:
              - Path=/api/auth/**

          - id: user-service
            uri: lb://commerce-system
            predicates:
              - Path=/api/users/**

          - id: password-service
            uri: lb://commerce-system
            predicates:
              - Path=/api/passwords/**

          - id: order-service
            uri: lb://commerce-system
            predicates:
              - Path=/api/orders/**

          - id: notification-service
            uri: lb://notification-service
            predicates:
              - Path=/api/notifications/**

server:
  port: 8100

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.servlet: DEBUG

